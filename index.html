<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Previewer — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📄</span>
                <div class="title-col">
                    <h1>Markdown Live Previewer</h1>
                    <p class="tagline">A premium, real-time side-by-side Markdown editor and HTML renderer.</p>
                </div>
            </div>
            <div class="badge">utilities</div>
        </header>

        <main class="workspace-card">
            
            <div class="split-pane">
                <div class="pane-column">
                    <div class="pane-header">Markdown Input</div>
                    <textarea id="markdown-input" placeholder="# Welcome to Markdown Live Previewer\n\nType your markdown here...\n\n- Beautiful dark glassmorphism\n- Real-time side-by-side rendering\n- Local storage support!"></textarea>
                </div>
                <div class="pane-column">
                    <div class="pane-header">Live Preview</div>
                    <div id="html-preview" class="preview-box"></div>
                </div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
